  <ellipse cx="9" cy="17" rx="1" ry="0.5" transform="rotate(-50 9 17)" fill="#f5e6c8" opacity="0.7"/>
  <ellipse cx="17" cy="9.5" rx="0.9" ry="0.45" transform="rotate(5 17 9.5)" fill="#f5e6c8" opacity="0.8"/>
  <ellipse cx="21" cy="19" rx="0.9" ry="0.45" transform="rotate(25 21 19)" fill="#f5e6c8" opacity="0.65"/>
